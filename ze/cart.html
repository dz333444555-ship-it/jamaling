<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السلة</title>
<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; margin:0; padding:0;}
.container { max-width:900px; margin:50px auto; padding:20px; background:rgba(0,0,0,0.85); border-radius:15px; }
.item-card { display:flex; justify-content: space-between; align-items:center; background: rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-bottom:15px; }
.item-info { display:flex; align-items:center; gap:15px; }
.item-info img { width:80px; height:80px; object-fit:cover; border-radius:10px; }
.item-name { font-size:18px; font-weight:bold; }
.item-price { color:#00ffdd; }
.qty-controls button { padding:5px 12px; margin:0 5px; font-size:16px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; }
.qty-controls .plus { background:#0f0; color:#000; }
.qty-controls .minus { background:#f00; color:#fff; }
.total { text-align:right; font-size:20px; font-weight:bold; margin-top:20px; color:#ffdd00; }
.checkout-btn { display:block; margin:20px auto 0; padding:12px 25px; font-size:20px; border:none; border-radius:10px; background:#00ffdd; color:#000; cursor:pointer; font-weight:bold; }
.checkout-btn:hover { background:#00cccc; }
.back-btn { display:block; margin:10px auto; padding:10px 20px; font-size:18px; border-radius:10px; border:none; cursor:pointer; background:#ff4444; color:#fff; font-weight:bold; }
.back-btn:hover { background:#ff0000; }
</style>
</head>
<body>

<div class="container">
<h1>السلة</h1>
<div id="cart-items"></div>
<div class="total" id="total"></div>
<button class="checkout-btn" onclick="alert('تم إتمام الشراء!')">إتمام الشراء</button>
<button class="back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let cartItemsDiv = document.getElementById('cart-items');

function renderCart(){
    cartItemsDiv.innerHTML = '';
    let total = 0;
    cart.forEach((item,index)=>{
        total += Number(item.price) * Number(item.qty);
        let div = document.createElement('div');
        div.className = 'item-card';
        div.innerHTML = `
            <div class="item-info">
                <img src="${item.image}" alt="${item.name}">
                <div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${item.price} دولار × ${item.qty}</div>
                </div>
            </div>
            <div class="qty-controls">
                <button class="minus" onclick="changeQty(${index},-1)">-</button>
                <button class="plus" onclick="changeQty(${index},1)">+</button>
            </div>
        `;
        cartItemsDiv.appendChild(div);
    });
    document.getElementById('total').innerText = "المجموع: " + total + " دولار";
    localStorage.setItem('cart', JSON.stringify(cart));
}

function changeQty(index, amount){
    cart[index].qty += amount;
    if(cart[index].qty <= 0){
        cart.splice(index,1);
    }
    renderCart();
}

renderCart();
</script>

</body>
</html>
